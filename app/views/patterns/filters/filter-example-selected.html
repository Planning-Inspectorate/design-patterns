{% extends "govuk-prototype-kit/layouts/unbranded.html" %}


{% block content %}

<style>
    .clear-link {
        margin-top: 20px;
        padding: 4px;
    }

    .selected-filter-tag {
        margin: 0px;
        border-radius: 5px;
        background: #f3f2f1;
        color: #0b0c0c;
        font-family: 'GDS Transport', Arial, sans-serif;
        border-radius: 4px;
        padding: 4px 10px !important;
        border: 1px solid #b1b4b6;
        white-space: nowrap;
        box-shadow: none !important;
    }
</style>

<h3 class="govuk-heading-s">
    Active filters

</h3>

<button class="govuk-button govuk-button--secondary selected-filter-tag" type="button">×
    Contains attachments: Yes</button>


<button class="govuk-button govuk-button--secondary selected-filter-tag" type="button">×
    Document type: PDF</button>

<div class="clear-link">
    <p class="govuk-body">
        <a href="" class="govuk-link">Clear filters</a>
    </p>
</div>
{% endblock %}
